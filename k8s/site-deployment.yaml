apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowtiq-website
  namespace: ai-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowtiq-website
  template:
    metadata:
      labels:
        app: flowtiq-website
    spec:
      containers:
      - name: website
        image: localhost:5001/flowtiq-website:monorepo-v5
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: flowtiq-website
  namespace: ai-services
spec:
  selector:
    app: flowtiq-website
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowtiq-website
  namespace: ai-services
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: www.flowtiq.nl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flowtiq-website
            port:
              number: 80
      - path: /trpc
        pathType: Prefix
        backend:
          service:
            name: flowtiq-website-backend
            port:
              number: 80
  - host: flowtiq.nl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flowtiq-website
            port:
              number: 80
      - path: /trpc
        pathType: Prefix
        backend:
          service:
            name: flowtiq-website-backend
            port:
              number: 80
  tls:
  - hosts:
    - www.flowtiq.nl
    - flowtiq.nl
    secretName: flowtiq-website-tls
